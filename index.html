<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaf & Barrel | Find the flavor. Log the ritual.</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- Tailwind CDN (MVP mode) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#0F0F11',
              surface: '#1A1A1D',
              border: '#2A2A2E',
              gold: '#D4AF37',
              copper: '#B87333',
              text: '#EAEAEA',
              muted: '#9CA3AF'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          }
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./style.css" />

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-brand-bg text-brand-text font-sans antialiased selection:bg-brand-gold selection:text-brand-bg flex flex-col min-h-screen">

  <!-- =========================
        Navigation
  ========================== -->
  <nav class="sticky top-0 z-50 bg-brand-bg/80 border-b border-brand-border py-4 transition-all duration-300">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">

      <!-- Logo -->
      <a href="#/" id="nav-logo"
         class="font-serif text-2xl font-semibold tracking-wide text-brand-gold">
        Leaf & Barrel
      </a>

      <!-- Desktop Nav -->
      <div class="hidden md:flex space-x-8 text-sm font-medium text-brand-muted">
        <a href="#/" class="nav-link hover:text-brand-text transition-colors" data-view="home">Home</a>
        <a href="#/database" class="nav-link hover:text-brand-text transition-colors" data-view="database">Database</a>
        <a href="#/pairings" class="nav-link hover:text-brand-text transition-colors" data-view="pairings">Pairings</a>
        <a href="#/guides" class="nav-link hover:text-brand-text transition-colors" data-view="guides">Guides</a>
      </div>

      <!-- Right Actions -->
      <div class="flex items-center space-x-4">

        <!-- Search Icon -->
        <button aria-label="Search"
          class="p-2 text-brand-muted hover:text-brand-text transition-colors">
          <i data-lucide="search" class="w-5 h-5"></i>
        </button>

        <!-- Sign In -->
        <button
          class="hidden md:block px-4 py-2 text-sm font-medium bg-brand-surface border border-brand-border rounded-full hover:border-brand-gold/50 transition-colors">
          Sign In
        </button>
      </div>

    </div>
  </nav>

  <!-- =========================
        Main App Root
  ========================== -->
  <main id="app-root"
        class="flex-grow flex flex-col w-full">
  </main>

  <!-- =========================
        Footer
  ========================== -->
  <footer class="border-t border-brand-border bg-brand-bg py-12 mt-20">
    <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-4 gap-8">

      <div class="col-span-1 md:col-span-2">
        <h3 class="font-serif text-xl text-brand-gold mb-4">
          Leaf & Barrel
        </h3>
        <p class="text-brand-muted text-sm max-w-sm mb-6">
          Find the flavor. Log the ritual. Pair it right.
          The modern compendium for the discerning aficionado.
        </p>
        <p class="text-xs text-brand-border">
          Enjoy responsibly.
        </p>
      </div>

      <div>
        <h4 class="font-medium mb-4">Explore</h4>
        <ul class="space-y-2 text-sm text-brand-muted">
          <li><a href="#/database" class="hover:text-brand-text transition-colors">Cigars</a></li>
          <li><a href="#/pairings" class="hover:text-brand-text transition-colors">Pairings</a></li>
          <li><a href="#/guides" class="hover:text-brand-text transition-colors">Guides</a></li>
        </ul>
      </div>

      <div>
        <h4 class="font-medium mb-4">Newsletter</h4>
        <div class="flex">
          <input type="email"
            placeholder="Your email"
            class="bg-brand-surface border border-brand-border rounded-l-md px-4 py-2 text-sm w-full focus:outline-none focus:border-brand-gold/50">
          <button
            class="bg-brand-gold text-brand-bg px-4 py-2 rounded-r-md text-sm font-medium hover:bg-brand-gold/90 transition-colors">
            Join
          </button>
        </div>
      </div>

    </div>
  </footer>

  <!-- =========================
        Scripts
  ========================== -->

  <!-- Initialize Lucide -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.lucide) {
        lucide.createIcons();
      }
    });
  </script>

  <!-- App Router -->
  <script type="module" src="./app.js"></script>

</body>
</html>
